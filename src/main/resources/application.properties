
spring.application.name=tienda

# Puerto del servidor. En Render (u otros PaaS) se inyecta la variable PORT;
# en local usa 8080 por defecto (o se sobreescribe con --server.port=8081).
server.port=${PORT:8080}

# ===========================================================================
# BASE DE DATOS
# ---------------------------------------------------------------------------
# Por defecto se usa H2 en memoria para desarrollo local (no requiere instalar
# nada). Para pasar a Neon (PostgreSQL) basta con definir las variables de
# entorno DATABASE_URL, DB_USERNAME y DB_PASSWORD; Spring detecta el driver
# automaticamente a partir de la URL.
#
# Ejemplo Neon:
#   DATABASE_URL=jdbc:postgresql://<host>/<db>?sslmode=require
#   DB_USERNAME=<usuario>
#   DB_PASSWORD=<password>
# ===========================================================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:tienda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 (solo util en desarrollo): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================================================================
# SEGURIDAD / JWT
# ===========================================================================
# Secret usado para firmar los JWT. En produccion definir JWT_SECRET (>= 32 chars).
app.jwt.secret=${JWT_SECRET:cambia-esta-clave-secreta-de-desarrollo-min-32-bytes-1234567890}
# Tiempo de expiracion del token en milisegundos (24 horas por defecto).
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===========================================================================
# CORS
# ===========================================================================
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}

# ===========================================================================
# CORREO (JavaMailSender)
# ---------------------------------------------------------------------------
# Para enviar correos reales con Gmail, define por VARIABLE DE ENTORNO (NUNCA en
# este archivo): MAIL_USERNAME = tu Gmail y MAIL_PASSWORD = el App Password de
# 16 caracteres (sin espacios). Si quedan vacios, el comprobante solo se imprime
# en consola.
# ===========================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Confia en el host SMTP para el handshake TLS (evita errores de cadena de
# certificados si un antivirus/proxy intercepta la conexion en este equipo).
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
# Timeouts para que un fallo de SMTP no bloquee la peticion indefinidamente.
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Datos del vendedor. Configurables por variable de entorno; el valor tras los
# ":" es solo el valor por defecto en desarrollo (overridable en produccion).
app.vendedor.email=${VENDEDOR_EMAIL:jc.inostrozach@gmail.com}
app.vendedor.whatsapp=${VENDEDOR_WHATSAPP:56957046074}

# ===========================================================================
# CLOUDINARY - se configura mas adelante (paso de productos)
# ===========================================================================
cloudinary.url=${CLOUDINARY_URL:}

# ===========================================================================
# USUARIO ADMIN SEMILLA (se crea al arrancar si no existe)
# ===========================================================================
app.admin.email=${ADMIN_EMAIL:admin@inostratech.cl}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.nombre=${ADMIN_NOMBRE:Administrador}
